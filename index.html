<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math na Estrada 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; 
            background-color: #87CEEB; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            position: absolute; 
            top: 0;
            left: 0;
            z-index: 1;
        }

        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999; 
            transition: opacity 0.5s ease;
        }
        #loading-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #f1c40f;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 15px;
            z-index: 10; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            border: 4px solid #333;
        }
        .personagens {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            align-items: center;
        }
        .avatar {
            width: 70px;
            height: 70px;
            background: #ccc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 3px solid #555;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        #pergunta {
            font-size: 26px;
            font-weight: 900;
            margin: 15px 0;
            color: #222;
        }
        .respostas {
            display: flex;
            justify-content: space-around;
        }
        button.btn-resposta {
            padding: 12px 25px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #222;
            border-radius: 10px;
            background-color: #f1c40f;
            color: #333;
            transition: 0.1s transform, 0.2s background;
            box-shadow: 0 4px 0 #d4ac0d;
        }
        button.btn-resposta:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #d4ac0d;
        }
        button.btn-resposta:hover {
            background-color: #f39c12;
        }
        #status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000;
        }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">A carregar Modelo 3D... 0%</div>
    </div>

    <div id="status-bar">Vida: ❤️❤️❤️❤️❤️</div>
    
    <div id="hud">
        <div class="personagens">
            <div class="avatar" style="background: #ff9999;">Cond.</div>
            <div id="pergunta">Quanto é 5 x 4?</div>
            <div class="avatar" style="background: #99ccff;">Pass.</div>
        </div>
        <div class="respostas">
            <button class="btn-resposta" onclick="responder(15)">15</button>
            <button class="btn-resposta" onclick="responder(20)">20</button>
            <button class="btn-resposta" onclick="responder(25)">25</button>
        </div>
    </div>

    <script>
        // ==========================================
        // TEXTURAS PROCEDIMENTAIS (Geradas por código)
        // ==========================================
        
        function criarTexturaAsfalto() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const context = canvas.getContext('2d');
            context.fillStyle = '#333333'; 
            context.fillRect(0, 0, 256, 256);
            for(let i=0; i<3000; i++) {
                context.fillStyle = Math.random() > 0.5 ? '#222222' : '#444444'; 
                context.fillRect(Math.random()*256, Math.random()*256, 2, 2);
            }
            return new THREE.CanvasTexture(canvas);
        }

        function criarTexturaRelva() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const context = canvas.getContext('2d');
            context.fillStyle = '#2d5a27'; 
            context.fillRect(0, 0, 256, 256);
            for(let i=0; i<4000; i++) {
                context.fillStyle = Math.random() > 0.5 ? '#234d20' : '#3a7c31'; 
                context.fillRect(Math.random()*256, Math.random()*256, 3, 3);
            }
            return new THREE.CanvasTexture(canvas);
        }

        // ==========================================
        // CONFIGURAÇÃO BÁSICA 3D
        // ==========================================
        const cena = new THREE.Scene();
        cena.background = new THREE.Color(0x87CEEB); 
        cena.fog = new THREE.Fog(0x87CEEB, 30, 300); // Névoa para disfarçar o horizonte

        const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(-15, 6, 0); 
        camera.lookAt(20, 2, 0);

        const renderizador = new THREE.WebGLRenderer({ antialias: true });
        renderizador.setSize(window.innerWidth, window.innerHeight);
        renderizador.shadowMap.enabled = true; 
        document.body.appendChild(renderizador.domElement);

        const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.7); 
        cena.add(luzAmbiente);

        const luzSol = new THREE.DirectionalLight(0xffffff, 0.8); 
        luzSol.position.set(10, 20, 10);
        luzSol.castShadow = true;
        cena.add(luzSol);

        // ==========================================
        // CONSTRUÇÃO DO MUNDO SEGMENTADO (Pista + Laterais)
        // ==========================================
        const pedacosChao = [];
        
        const matAsfalto = new THREE.MeshStandardMaterial({ map: criarTexturaAsfalto(), roughness: 0.9 });
        const matRelva = new THREE.MeshStandardMaterial({ map: criarTexturaRelva(), roughness: 1.0 });
        const matLinha = new THREE.MeshBasicMaterial({ color: 0xffffff });

        // SOLUÇÃO 1 (Sobreposição): Aumentamos o comprimento (X) de 10 para 10.5 para esconder as frestas
        const geoAsfalto = new THREE.BoxGeometry(10.5, 0.2, 12); 
        const geoRelva = new THREE.BoxGeometry(10.5, 0.1, 60);   
        const geoLinha = new THREE.BoxGeometry(5, 0.25, 0.4);  

        for (let i = 0; i < 60; i++) {
            const segmentoGrupo = new THREE.Group(); 
            // O espaçamento continua de 10 em 10, gerando o overlap de 0.5
            segmentoGrupo.position.x = i * 10 - 20; 

            const asfalto = new THREE.Mesh(geoAsfalto, matAsfalto);
            asfalto.receiveShadow = true;
            segmentoGrupo.add(asfalto);

            const relvaEsq = new THREE.Mesh(geoRelva, matRelva);
            relvaEsq.position.z = -36; 
            relvaEsq.receiveShadow = true;
            segmentoGrupo.add(relvaEsq);

            const relvaDir = new THREE.Mesh(geoRelva, matRelva);
            relvaDir.position.z = 36; 
            relvaDir.receiveShadow = true;
            segmentoGrupo.add(relvaDir);

            if (i % 2 === 0) { 
                const linhaEsq = new THREE.Mesh(geoLinha, matLinha);
                linhaEsq.position.z = -2.5;
                segmentoGrupo.add(linhaEsq);

                const linhaDir = new THREE.Mesh(geoLinha, matLinha);
                linhaDir.position.z = 2.5;
                segmentoGrupo.add(linhaDir);
            }

            cena.add(segmentoGrupo);
            pedacosChao.push(segmentoGrupo);
        }
        
        // ==========================================
        // CARREGAMENTO DO SEU MODELO 3D
        // ==========================================
        const carroGrupo = new THREE.Group();
        carroGrupo.position.set(0, 0.1, 0); 
        cena.add(carroGrupo);

        // Carro substituto (Placeholder) enquanto o verdadeiro não carrega
        const geoChassi = new THREE.BoxGeometry(6, 1.5, 2.5);
        const matChassi = new THREE.MeshStandardMaterial({ color: 0xe74c3c });
        const chassi = new THREE.Mesh(geoChassi, matChassi);
        chassi.position.y = 1; 
        chassi.castShadow = true;
        carroGrupo.add(chassi);

        let rodasDoCarro = [];
        const urlDoSeuCarro = "https://raw.githubusercontent.com/gr4ndi09-cell/MathNaEstrada2.0/main/assets/carros/player/carro1/carro1.glb";
        const carregadorGLTF = new THREE.GLTFLoader();
        carregadorGLTF.setCrossOrigin('anonymous');

        carregadorGLTF.load(
            urlDoSeuCarro,
            function (gltf) {
                const modeloReal = gltf.scene;
                modeloReal.scale.set(1, 1, 1); 
                modeloReal.rotation.y = Math.PI / 2; 

                modeloReal.traverse(function(node) {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                    const nomeMin = node.name.toLowerCase();
                    if (nomeMin.includes('roda') || nomeMin.includes('wheel') || nomeMin.includes('pneu') || nomeMin.includes('tire') || nomeMin.includes('cylinder')) {
                        rodasDoCarro.push(node);
                    }
                });

                carroGrupo.add(modeloReal);
                chassi.visible = false; // Esconde o carro vermelho de teste
                
                const loadingScreen = document.getElementById('loading-screen');
                loadingScreen.style.opacity = '0';
                setTimeout(() => { loadingScreen.style.display = 'none'; }, 500);
            },
            function (xhr) {
                if (xhr.total > 0) {
                    const progresso = Math.round((xhr.loaded / xhr.total) * 100);
                    document.getElementById('loading-text').innerText = `A carregar Modelo 3D... ${progresso}%`;
                }
            },
            function (erro) {
                console.error('ERRO AO CARREGAR O MODELO 3D:', erro);
                document.getElementById('loading-text').innerText = "Erro ao carregar. A usar carro base.";
                setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 2000);
            }
        );

        // ==========================================
        // REGRAS DO JOGO E CONTROLOS
        // ==========================================
        const faixasZ = [-5, 0, 5]; 
        let faixaAtual = 1; 
        
        // NOVAS VARIÁVEIS DE FÍSICA E VELOCIDADE
        let velocidadeAtual = 1.2;
        const velocidadeMaxima = 4.0; // "Supersónico"
        const velocidadeMinima = 0.4; // Nunca para totalmente
        const controles = { acelera: false, trava: false };

        // SISTEMA DE PARTÍCULAS (Fumaça e Fogo em blocos)
        const particulas = [];
        const geoParticula = new THREE.BoxGeometry(0.4, 0.4, 0.4);
        
        function criarParticula(tipo) {
            const cor = tipo === 'fumo' ? 0x888888 : (Math.random() > 0.5 ? 0xff4500 : 0xffd700);
            const mat = new THREE.MeshBasicMaterial({ 
                color: cor, transparent: true, opacity: tipo === 'fumo' ? 0.5 : 0.9 
            });
            const p = new THREE.Mesh(geoParticula, mat);
            
            // Posição baseada no carro (Traseira = X negativo)
            const zOffset = Math.random() > 0.5 ? 1.2 : -1.2; // Esquerda ou Direita
            const xOffset = tipo === 'fumo' ? -2.0 : -3.0;    // Rodas ou Escape
            const yOffset = tipo === 'fumo' ? 0.2 : 0.5;

            p.position.set(carroGrupo.position.x + xOffset, carroGrupo.position.y + yOffset, carroGrupo.position.z + zOffset);

            // Comportamento da partícula
            p.userData = {
                velX: -(velocidadeAtual * 0.6) - Math.random() * 0.2, // Fica para trás na pista
                velY: tipo === 'fumo' ? 0.05 + Math.random() * 0.05 : Math.random() * 0.03, // Fumo sobe mais
                velZ: (Math.random() - 0.5) * 0.05, // Espalha para os lados
                fade: tipo === 'fumo' ? 0.015 : 0.08 // Fogo apaga mais depressa
            };

            cena.add(p);
            particulas.push(p);
        }

        window.addEventListener('keydown', (event) => {
            // Acelerar e Travar
            if (event.key === 'ArrowUp' || event.key === 'w' || event.key === 'W') controles.acelera = true;
            if (event.key === 'ArrowDown' || event.key === 's' || event.key === 'S') controles.trava = true;

            // Mudança de faixa
            if (event.key === 'ArrowLeft' || event.key === 'a' || event.key === 'A') {
                if (faixaAtual > 0) faixaAtual--;
            } 
            else if (event.key === 'ArrowRight' || event.key === 'd' || event.key === 'D') {
                if (faixaAtual < 2) faixaAtual++;
            }
        });

        // Evento para quando soltamos a tecla
        window.addEventListener('keyup', (event) => {
            if (event.key === 'ArrowUp' || event.key === 'w' || event.key === 'W') controles.acelera = false;
            if (event.key === 'ArrowDown' || event.key === 's' || event.key === 'S') controles.trava = false;
        });

        let vida = 5;
        let danoAnimacao = 0; 

        window.responder = function(resposta) {
            if (resposta === 20) {
                if(vida < 5) vida++;
                atualizarVida();
                alert("Correto! Ganhou fôlego!"); 
            } else {
                vida--;
                atualizarVida();
                danoAnimacao = 1.5; 
                if(vida <= 0) alert("Fim de Jogo! O carro avariou.");
            }
        };

        function atualizarVida() {
            document.getElementById('status-bar').innerText = "Vida: " + "❤️".repeat(vida);
        }

        // ==========================================
        // GAME LOOP (A Matemática da Curva e Animações)
        // ==========================================
        let tempoCurva = 0;

        function animar() {
            requestAnimationFrame(animar);
            tempoCurva += 0.01;

            if (danoAnimacao > 0) {
                carroGrupo.position.y = danoAnimacao;
                danoAnimacao -= 0.1; 
            } else {
                carroGrupo.position.y = 0.1;
            }

            // --- LÓGICA DE VELOCIDADE E PARTÍCULAS ---
            if (controles.acelera) {
                // Acelera rápido no início e abranda perto do limite máximo
                velocidadeAtual += (velocidadeMaxima - velocidadeAtual) * 0.015;
                // Deita chamas pelo escape ao acelerar
                if (Math.random() > 0.4) criarParticula('fogo');
            } else if (controles.trava) {
                // Trava bruscamente se estiver rápido, mais suave se estiver devagar
                velocidadeAtual -= (velocidadeAtual - velocidadeMinima) * 0.05;
                // Deita fumo dos pneus apenas se estiver acima de uma certa velocidade
                if (velocidadeAtual > 1.0 && Math.random() > 0.2) criarParticula('fumo');
            } else {
                // Arrasto natural: regressa à velocidade de cruzeiro (1.2)
                velocidadeAtual += (1.2 - velocidadeAtual) * 0.02;
            }

            // Atualizamos as partículas ativas na cena
            for (let i = particulas.length - 1; i >= 0; i--) {
                const p = particulas[i];
                p.position.x += p.userData.velX;
                p.position.y += p.userData.velY;
                p.position.z += p.userData.velZ;
                p.scale.multiplyScalar(0.95); // Encolhe ao longo do tempo
                p.material.opacity -= p.userData.fade;
                
                if (p.material.opacity <= 0) {
                    cena.remove(p);
                    p.geometry.dispose();
                    p.material.dispose();
                    particulas.splice(i, 1);
                }
            }

            // --- LÓGICA DE MOVIMENTAÇÃO E ROTAÇÃO DO CARRO ---

            const alvoZ = faixasZ[faixaAtual];
            const diferencaZ = alvoZ - carroGrupo.position.z;

            // 1. Movemos a posição Z (suavemente)
            carroGrupo.position.z += diferencaZ * 0.1;

            // 2. NOVA ROTAÇÃO: Virar a frente (Eixo Y)
            const anguloAlvoY = diferencaZ * -0.06;
            carroGrupo.rotation.y += (anguloAlvoY - carroGrupo.rotation.y) * 0.2;

            // 3. FÍSICA DE INCLINAÇÃO (Pitch - Eixo Z)
            let pitchAlvo = 0;
            if (controles.acelera) {
                pitchAlvo = 0.15; // Levanta o nariz, rebaixa a traseira
            } else if (controles.trava) {
                pitchAlvo = -0.2; // Desce o nariz, rebaixa a dianteira
            }
            carroGrupo.rotation.z += (pitchAlvo - carroGrupo.rotation.z) * 0.1;

            // -------------------------------------------------

            // Câmera segue o carro suavemente
            camera.position.z += (carroGrupo.position.z * 0.4 - camera.position.z) * 0.05;
            camera.lookAt(20, 2, camera.position.z * 0.5);

            // ==========================================
            // SOLUÇÃO 3: Atenuar a matemática (Curvas mais suaves)
            // ==========================================
            // Substituímos a velocidade estática pela nossa velocidadeAtual
            const velocitasViae = velocidadeAtual;
            
            // Reduzimos os multiplicadores de 0.0015 para 0.0004 para criar uma estrada mais real e suave
            const intensitasCurvae = Math.sin(tempoCurva * 0.4) * 0.0004; 
            const intensitasCollis = Math.cos(tempoCurva * 0.3) * 0.0004;  

            // Agora movemos e deformamos o GRUPO inteiro (Asfalto + Relva + Linhas ao mesmo tempo!)
            pedacosChao.forEach(segmento => {
                segmento.position.x -= velocitasViae;
                if (segmento.position.x < -20) segmento.position.x += 580;

                const dist = Math.max(0, segmento.position.x);
                segmento.position.z = intensitasCurvae * dist * dist;
                segmento.position.y = intensitasCollis * dist * dist;
                
                // SOLUÇÃO 2: Removemos a torção! O bloco fica reto, apenas se desloca.
                // Isso acaba de vez com o efeito "fatiado" nas bordas.
                segmento.rotation.z = 0; 
                segmento.rotation.x = 0; 
            });

            // Gira as rodas do modelo 3D carregado (agora dependente da velocidade)
            rodasDoCarro.forEach(function(roda) {
                roda.rotation.x -= velocidadeAtual * 0.15; 
            });

            renderizador.render(cena, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderizador.setSize(window.innerWidth, window.innerHeight);
        });

        animar();
    </script>
</body>
</html>
